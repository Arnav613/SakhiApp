name: sakhi
description: Your AI Companion. Always in Your Corner.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  go_router: ^13.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fl_chart: ^0.66.2
  percent_indicator: ^4.2.3
  lottie: ^3.0.0
  http: ^1.2.0
  device_calendar: ^4.3.0
  permission_handler: ^11.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  flutter_ringtone_player: ^4.0.0
  geolocator: ^11.0.0
  camera: ^0.10.5+9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
